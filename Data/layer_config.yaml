# Layer configuration for the dashboard build.
# The build script reads this file to control which GeoJSON properties
# become map layers and how they are displayed.

# ---------------------------------------------------------------------------
# Exclusions
# ---------------------------------------------------------------------------
# Exclude by flat field name (group__metric__leaf), metric (group__metric),
# or entire group key.  Any discovered layer matching an entry is dropped.
exclude:
  - refugee_sites
  - cross_border
  # - healthsites_io                  # entire group
  # - cross_border__poe_passengers__n_poes   # single leaf

# ---------------------------------------------------------------------------
# Group configuration
# ---------------------------------------------------------------------------
# Keys are the top-level GeoJSON property names.  Unlisted groups get a
# title-cased version of the key with underscores replaced by spaces.
#
# legend_round controls how tick labels are formatted on the color bar:
#   int  — round to nearest integer (default)
#   0-6  — number of decimal places (e.g. 2 → "0.51")
groups:
  epi:
    label: "Observed (WHO)"
    palette: reds
    scale: log
    legend_round: int
  insp_sitrep:
    label: "Observed (INSP sitrep)"
    palette: reds
    scale: log
    legend_round: int
  worldpop:
    label: "Population"
    palette: viridis
    scale: log
    legend_round: int
  grid3_healthsites:
    label: "Health facilities (GRID3)"
    palette: viridis
    scale: log
    legend_round: int
  healthsites_io:
    label: "Health facilities (healthsites.io)"
    palette: viridis
    scale: log
    legend_round: int
  ccvi:
    label: "Vulnerability (CCVI)"
    palette: viridis
    scale: log
    legend_round: 2
  fao_lccs:
    label: "Land cover (FAO LCCS)"
    palette: viridis
    scale: log
    legend_round: 4
  gdp_pc:
    label: "GDP per capita"
    palette: viridis
    scale: log
    legend_round: int


# ---------------------------------------------------------------------------
# Group ordering
# ---------------------------------------------------------------------------
# Groups listed here appear first in the layer dropdown, in this order.
# Auto-discovered groups not listed here appear after, alphabetically.
group_order:
  - epi
  - insp_sitrep
  - worldpop
  - grid3_healthsites
  - healthsites_io
  - ccvi
  - fao_lccs
  - gdp_pc
  - refugee_sites
  - cross_border
